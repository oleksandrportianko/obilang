training:
  batch_tokens: 4096
  gradient_accumulation_steps: 8
  learning_rate: 0.0003
  warmup_steps: 4000
  scheduler: inverse_sqrt
  epochs: 20
  label_smoothing: 0.1
  gradient_clip_norm: 1.0
  mixed_precision: true
  checkpoint_every_steps: 1000
  validate_every_steps: 1000
  keep_periodic_checkpoints: 3
  patience_validations: 8
  seed: 42
  deterministic: false
  device: auto
