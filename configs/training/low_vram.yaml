training:
  # The small model used only ~1.6 GB on the local GPU; this improves throughput.
  batch_tokens: 4096
  gradient_accumulation_steps: 1
  learning_rate: 0.0003
  # The previous 4,000-step warmup exceeded the entire small-corpus run.
  warmup_steps: 500
  scheduler: inverse_sqrt
  epochs: 12
  label_smoothing: 0.1
  gradient_clip_norm: 1.0
  mixed_precision: true
  checkpoint_every_steps: 3000
  validate_every_steps: 10000
  keep_periodic_checkpoints: 2
  patience_validations: 6
  seed: 42
  deterministic: false
  device: auto
